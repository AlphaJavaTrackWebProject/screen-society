<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- Copy your <head> and <nav> from index.html here -->
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content=""/>
    <meta name="author" content=""/>
    <title>Create post</title>
    <link rel="icon" href="../static/images/Icon.png" th:href="@{/images/Icon.png}">
    <!-- Font Awesome icons (free version)-->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Google fonts-->
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet"
          type="text/css"/>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800"
          rel="stylesheet" type="text/css"/>
    <!-- Core theme CSS (includes Bootstrap)-->
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>
<body>
<!-- Navigation-->
<nav th:replace="~{fragments  :: top-nav}"></nav>

<header class="masthead" th:style="'background-image: url(' + @{/assets/img/createPost-page1.png} + ')'">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="site-heading">
                    <h1>New Post</h1>
                    <span class="subheading">Share your thoughts with the society</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container px-4 px-lg-5 mt-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
        <div class="col-md-10 col-lg-8 col-xl-7">

            <form th:action="@{/posts/new}" method="post" th:object="${post}">

                <div class="form-floating mb-3">
                    <input class="form-control" id="title" type="text" placeholder="Enter post title..." th:field="*{title}" />
                    <label for="title">Post Title</label>
                    <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <div class="form-floating mb-3">
                    <textarea class="form-control" id="content" placeholder="Write your content here..." style="height: 12rem" th:field="*{content}"></textarea>
                    <label for="content">Content</label>
                    <div class="text-danger" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
                </div>

                <button class="btn btn-primary text-uppercase d-block mx-auto" type="submit">Publish Post</button>
            </form>

        </div>
    </div>
</div>
<!-- Copy your footer and script tags from index.html here -->
<div th:replace="~{fragments :: footer}"></div>
<!-- Bootstrap core JS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Core theme JS-->
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
