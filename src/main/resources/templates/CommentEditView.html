<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
  <title>Edit Comment - Screen Society</title>
  <link rel="icon" th:href="@{/images/Icon.png}">
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css"/>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<!-- Navigation -->
<nav th:replace="~{fragments  :: top-nav}"></nav>


<header class="masthead" th:style="'background-image: url(' + @{/assets/img/createPost-page} + ')'">
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="page-heading">
          <h1>Edit Comment</h1>
          <span class="subheading">Rephrase your thoughts</span>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="mb-4">
  <div class="container px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="my-5 bg-light p-4 rounded shadow-sm">

          <form th:action="@{/comments/{id}/update(id=${id})}" method="POST" th:object="${comment}">

            <div class="form-floating mb-3">
              <textarea class="form-control" id="content" placeholder="Write your content here..." style="height: 12rem" th:field="*{content}" th:classappend="${#fields.hasErrors('content')} ? 'is-invalid' : ''"></textarea>
              <label for="content">Comment Text</label>
              <div class="invalid-feedback" th:errors="*{content}">Content error</div>
            </div>

            <div class="d-flex justify-content-between mt-4">
              <button class="btn btn-primary text-uppercase" type="submit">Update Comment</button>
            </div>
          </form>

          <form class="mt-3 text-end" th:action="@{/comments/{id}/delete(id=${id})}" method="post">
            <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this comment permanently?')">Delete Comment Entirely</button>
          </form>

        </div>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
