<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- Navigation Fragment -->
<nav class="navbar navbar-expand-lg navbar-light" id="mainNav" th:fragment="top-nav">
    <div class="container-fluid px-4 px-lg-5">
        <a class="navbar-brand" th:href="@{/}">Screen Society</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            Menu
            <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto py-4 py-lg-0">

                <!-- Anonymous Routes -->
                <th:block sec:authorize="isAnonymous()">
                    <li class="nav-item">
                        <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/auth/login}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/auth/register}">Register</a>
                    </li>
                </th:block>

                <!-- Public Routes -->
                <li class="nav-item">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/about}">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/contact}">Contact</a>
                </li>

                <!-- Authenticated Routes -->
                <th:block sec:authorize="isAuthenticated()">
                    <li class="nav-item">
                        <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/posts/new}">Create Post</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/posts}">Explore</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/users/{id}/update(id=${#authentication.principal.user.id})}">
                            Edit Profile
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MODERATOR')">
                        <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/admin/panel}">Admin Panel</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/logout}">Logout</a>
                    </li>
                </th:block>
            </ul>
            <ul class="navbar-nav ms-lg-5 py-4 py-lg-0">
                <!-- Your Target Corner Link -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/users/{id}(id=${#authentication.principal.user.id})}">
                        <img th:src="'https://ui-avatars.com/api/?name=' + ${#authentication.principal.user.firstName} + '+' + ${#authentication.principal.user.lastName} + '&background=random&size=64'"
                             alt="Profile"
                             class="rounded-circle"
                             style="width: 40px; height: 40px;">
                    </a>
                </li>
<!--                <li class="nav-item" sec:authorize="isAuthenticated()">-->
<!--                    <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/users/{id}(id=${#authentication.principal.user.id})}">-->
<!--                        <i class="fas fa-user-circle fa-3x"></i>-->
<!--                    </a>-->
<!--                </li>-->
            </ul>
        </div>
    </div>
</nav>

<footer class="border-top" th:fragment="footer">
    <div class="container px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <ul class="list-inline text-center">
                    <li class="list-inline-item">
                        <a href="#!">
                            <span class="fa-stack fa-lg">
                                <i class="fas fa-circle fa-stack-2x"></i>
                                <i class="fab fa-twitter fa-stack-1x fa-inverse"></i>
                            </span>
                        </a>
                    </li>
                    <li class="list-inline-item">
                        <a href="#!">
                            <span class="fa-stack fa-lg">
                                <i class="fas fa-circle fa-stack-2x"></i>
                                <i class="fab fa-facebook-f fa-stack-1x fa-inverse"></i>
                            </span>
                        </a>
                    </li>
                    <li class="list-inline-item">
                        <a href="#!">
                            <span class="fa-stack fa-lg">
                                <i class="fas fa-circle fa-stack-2x"></i>
                                <i class="fab fa-github fa-stack-1x fa-inverse"></i>
                            </span>
                        </a>
                    </li>
                </ul>
                <div class="small text-center text-muted fst-italic py-4">Copyright &copy; Screen Society 2026</div>
            </div>
        </div>
    </div>
</footer>

</html>
