<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content=""/>
    <meta name="author" content=""/>
    <title>Register</title>
    <link rel="icon" href="../static/images/Icon.png" th:href="@{/images/Icon.png}">
    <!-- Font Awesome icons (free version)-->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Google fonts-->
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet"
          type="text/css"/>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800"
          rel="stylesheet" type="text/css"/>
    <!-- Core theme CSS (includes Bootstrap)-->
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<!-- Navigation-->
<nav th:replace="~{fragments  :: top-nav}"></nav>

<!-- Page Header-->
<header class="masthead" th:style="'background-image: url(' + @{/assets/img/Login-page.png} + ')'">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="page-heading">
                    <h1>Login to access more of our content</h1>
                </div>
            </div>
        </div>
    </div>
</header>
<!-- Main Content-->
<main class="mb-4">
    <div class="container px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="my-5">
                    <!-- * * * * * * * * * * * * * * *-->
                    <!-- * * SB Forms Contact Form * *-->
                    <!-- * * * * * * * * * * * * * * *-->
                    <!-- This form is pre-integrated with SB Forms.-->
                    <!-- To make this form functional, sign up at-->
                    <!-- https://startbootstrap.com/solution/contact-forms-->
                    <!-- to get an API token!-->
                    <form th:action="@{/auth/register}" method="POST" th:object="${register}">
                        <div class="form-floating">
                            <input class="form-control"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                                   th:field="*{username}" type="text" placeholder="Enter username..."/>
                            <label for="username">Username</label>
                            <div class="invalid-feedback" data-sb-feedback="name:required" th:errors="*{username}">
                                Username is required.
                            </div>
                        </div>
                        <div class="form-floating">
                            <input class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                                   th:field="*{password}" type="password" placeholder="Enter password..."/>
                            <label for="password">Password</label>
                            <div class="invalid-feedback" data-sb-feedback="password:required" th:errors="*{password}">A
                                password is required.
                            </div>
                        </div>
                        <div class="form-floating">
                            <input class="form-control"
                                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''"
                                   th:field="*{firstName}" type="text" placeholder="Enter firstname..."/>
                            <label for="firstname">Firstname</label>
                            <div class="invalid-feedback" data-sb-feedback="firstname:required"
                                 th:errors="*{firstName}">Firstname is required.
                            </div>
                        </div>
                        <div class="form-floating">
                            <input class="form-control"
                                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''"
                                   th:field="*{lastName}" type="text" placeholder="Enter lastname..."/>
                            <label for="lastname">Lastname</label>
                            <div class="invalid-feedback" data-sb-feedback="lastname:required" th:errors="*{lastName}">
                                Lastname is required.
                            </div>
                        </div>
                        <div class="form-floating">
                            <input class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                   th:field="*{email}" type="text" placeholder="Enter email..."/>
                            <label for="email">Email</label>
                            <div class="invalid-feedback" data-sb-feedback="email:required" th:errors="*{email}">An
                                email is required.
                            </div>
                        </div>

                        <br/>

                        <button class="btn btn-primary text-uppercase d-block mx-auto" id="submitButton" type="submit">
                            Register
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<!-- Footer-->
<div th:replace="~{fragments :: footer}"></div>
<!-- Bootstrap core JS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Core theme JS-->
<script th:src="@{/js/scripts.js}"></script>
<!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * *-->
<!-- * *                               SB Forms JS                               * *-->
<!-- * * Activate your form at https://startbootstrap.com/solution/contact-forms * *-->
<!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * *-->
</body>
</html>
