<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
  <title>Manage Posts - Screen Society</title>
  <link rel="icon" th:href="@{/images/Icon.png}">
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css"/>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
  <div class="container px-4 px-lg-5">
    <a class="navbar-brand" th:href="@{/}">Screen Society</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
      Menu <i class="fas fa-bars"></i>
    </button>
    <div class="collapse navbar-collapse" id="navbarResponsive">
      <ul class="navbar-nav ms-auto py-4 py-lg-0">
        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/}">Home</a></li>
        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MODERATOR')"><a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/admin/panel}">Admin Panel</a></li>
        <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/logout}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<header class="masthead" th:style="'background-image: url(' + @{/assets/img/home-bg.jpg} + ')'">
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="site-heading">
          <h1>Manage Posts</h1>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="container px-4 px-lg-5 mt-5 mb-5">

  <form th:action="@{/admin/posts}" method="get" class="row g-3 mb-4 p-3 bg-light rounded shadow-sm">
    <div class="col-md-8">
      <input type="text" name="title" class="form-control" placeholder="Search by title..." th:value="${param.title}">
    </div>
    <div class="col-md-4">
      <button type="submit" class="btn btn-primary w-100">Filter Posts</button>
    </div>
  </form>

  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-dark">
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="post : ${posts}">
        <td><a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}" target="_blank">Post Title</a></td>
        <td th:text="${post.author}">Author</td>
        <td th:text="${#temporals.format(post.createdAt, 'MMM dd, yyyy')}">Date</td>
        <td>
          <!-- ONLY ADMIN can delete here based on your controller @PreAuthorize -->
          <form sec:authorize="hasRole('ADMIN')" th:action="@{/admin/{id}/delete(id=${post.id})}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this post?')">Delete</button>
          </form>
          <span sec:authorize="!hasRole('ADMIN')" class="text-muted small">No permissions</span>
        </td>
      </tr>
      </tbody>
    </table>
    <div th:if="${posts.empty}" class="alert alert-info text-center">No posts found.</div>
  </div>
</div>

<footer class="border-top">
  <div class="container px-4 px-lg-5">
    <div class="small text-center text-muted fst-italic py-4">Copyright &copy; Screen Society 2026</div>
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
