<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
  <title>Edit Profile - Screen Society</title>
  <link rel="icon" th:href="@{/images/Icon.png}">
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css"/>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<!-- Navigation -->
<nav th:replace="~{fragments  :: top-nav}"></nav>


<header class="masthead" th:style="'background-image: url(' + @{/assets/img/userView-page.png} + ')'">
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="page-heading">
          <h1>Update Profile</h1>
          <span class="subheading">Keep your details up to date</span>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="mb-4">
  <div class="container px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="my-5">

          <form th:action="@{/users/{id}/update(id=${id})}" method="POST" th:object="${user}">

            <!-- First Name -->
            <div class="form-floating mb-3">
              <input class="form-control" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''" th:field="*{firstName}" type="text" placeholder="Enter firstname..."/>
              <label for="firstName">Firstname</label>
              <div class="invalid-feedback" th:errors="*{firstName}">Firstname error</div>
            </div>

            <!-- Last Name -->
            <div class="form-floating mb-3">
              <input class="form-control" th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''" th:field="*{lastName}" type="text" placeholder="Enter lastname..."/>
              <label for="lastName">Lastname</label>
              <div class="invalid-feedback" th:errors="*{lastName}">Lastname error</div>
            </div>

            <!-- Email -->
            <div class="form-floating mb-3">
              <input class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" th:field="*{email}" type="email" placeholder="Enter email..."/>
              <label for="email">Email</label>
              <div class="invalid-feedback" th:errors="*{email}">Email error</div>
            </div>

            <br/>
            <button class="btn btn-primary text-uppercase d-block mx-auto" type="submit">Save Changes</button>
          </form>

        </div>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
