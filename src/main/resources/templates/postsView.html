<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>Explore Posts - Screen Society</title>
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet"
          type="text/css"/>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800"
          rel="stylesheet" type="text/css"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link rel="icon" th:href="@{/images/Icon.png}">
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body>

<!-- Navigation -->
<nav th:replace="~{fragments  :: top-nav}"></nav>


<!-- Page Header -->
<header class="masthead" th:style="'background-image: url(' + @{/assets/img/explore-page.png} + ')'">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="site-heading">
                    <h1>Explore Discussions</h1>
                    <span class="subheading">Find your next favorite topic</span>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- Main Content -->
<div class="container mt-5 px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
        <div class="col-md-10 col-lg-8 col-xl-10">

            <!-- Filter Bar -->
            <form th:action="@{/posts}" method="get" class="row g-3 mb-5 p-4 bg-light rounded shadow-sm">
                <div class="col-md-4">
                    <label class="form-label text-muted small fw-bold">Title</label>
                    <input type="text" name="title" th:value="${filterOptions.title.orElse('')}" class="form-control"
                           placeholder="Search by title...">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted small fw-bold">Author</label>
                    <input type="text" name="authorUsername" th:value="${filterOptions.authorUsername.orElse('')}"
                           class="form-control" placeholder="Author username...">
                </div>
                <div class="col-md-2">
                    <label class="form-label text-muted small fw-bold">Tag</label>
                    <input type="text" name="tagName" th:value="${filterOptions.tagName.orElse('')}"
                           class="form-control" placeholder="Tag...">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Filter</button>
                </div>
                <div class="row g-3 mt-2">
                    <div class="col-md-3">
                        <label class="form-label text-muted small fw-bold">Created After</label>
                        <input type="date" name="createdAfter" th:value="${filterOptions.createdAfter.orElse('')}"
                               class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-muted small fw-bold">Created Before</label>
                        <input type="date" name="createdBefore" th:value="${filterOptions.createdBefore.orElse('')}"
                               class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-muted small fw-bold">Sort By</label>
                        <select name="sortBy" class="form-select">
                            <option value="" th:selected="${filterOptions.sortBy.isEmpty()}">Default</option>
                            <option value="title" th:selected="${filterOptions.sortBy.orElse('') == 'title'}">Title
                            </option>
                            <option value="createdAt" th:selected="${filterOptions.sortBy.orElse('') == 'createdAt'}">
                                Date
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-muted small fw-bold">Order</label>
                        <select name="sortOrder" class="form-select">
                            <option value="" th:selected="${filterOptions.sortOrder.isEmpty()}">Default</option>
                            <option value="asc" th:selected="${filterOptions.sortOrder.orElse('') == 'asc'}">Ascending
                            </option>
                            <option value="desc" th:selected="${filterOptions.sortOrder.orElse('') == 'desc'}">
                                Descending
                            </option>
                        </select>
                    </div>
                </div>
            </form>

            <hr class="my-4">

            <!-- Posts List -->
            <div th:each="post : ${posts}" class="post-preview mb-5">
                <a th:href="@{/posts/{id}(id=${post.id})}" class="text-decoration-none">
                    <h2 class="post-title fw-bolder" th:text="${post.title}">Post Title</h2>
                    <h3 class="post-subtitle fs-5 text-muted fw-light"
                        th:text="${post.content.length() > 120 ? post.content.substring(0, 120) + '...' : post.content}">
                        Content snippet...</h3>
                </a>

                <div class="mt-2 mb-2" th:if="${post.tags != null}">
                    <i class="fas fa-tags me-1 text-muted"></i>
                    <span th:each="tag : ${post.tags}" class="badge bg-secondary me-1"
                          th:text="${tag.name}">Tag Name</span>
                </div>

                <p class="post-meta ">
                    Posted by <a th:href="@{/users/{id}(id=${post.author.id})}"
                                 th:text="${post.author.username}">Author</a>
                    <span th:text="|on : ${#temporals.format(post.createdAt,'MMMM dd, yyyy')} |">on September 24, 2023</span>
                    <span class="ms-3" title="Likes">
                        <i class="fas fa-thumbs-up text-primary"></i> <span
                            th:text="${post.likedByUsers.size()}">0</span>
                    </span>
                    <span class="ms-3" title="Comments">
                        <i class="fas fa-comment text-secondary"></i> <span
                            th:text="${post.commentList.size()}">0</span>
                    </span>
                </p>
                <hr class="my-4"/>
            </div>

            <div th:if="${posts.empty}" class="alert alert-info text-center">
                No posts match your filters. Try adjusting your search!
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>

</body>
</html>
