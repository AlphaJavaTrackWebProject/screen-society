<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title th:text="${post.title}">Post Details</title>
    <link rel="icon" th:href="@{/images/Icon.png}">
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet"
          type="text/css"/>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800"
          rel="stylesheet" type="text/css"/>
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body>

<!-- Navigation (Use your existing nav) -->
<nav th:replace="~{fragments  :: top-nav}"></nav>


<!--    <div class="container">-->
<!--        <h1 th:text="${post.title}">Post Title</h1>-->
<!--        <p>Posted by <span th:text="${post.author.username}">Author</span></p>-->
<!--    </div>-->
<!--</header>-->
<header class="masthead" th:style="'background-image: url(' + @{/assets/img/single-post.jpg} + ')'">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="site-heading">
                    <h1 th:text="${post.title}">Post Title</h1>
                    <p>Posted by
                        <a th:href="@{/users/{id}(id=${post.author.id})}"
                           class="ms-2 text-white text-decoration-none fw-bold">
                            <i class="fas fa-user-edit me-1"></i>
                            <span th:text="${post.author.username}">Author</span>
                        </a>
                        <span class="text-white-50 ms-2">
                            on <span th:text="${#temporals.format(post.createdAt, 'MMMM dd, yyyy')}">September 24, 2023</span>
                        </span>
                    </p>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container mt-5">

    <div th:if="${errorMessage}" class="alert alert-danger text-center alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}">Error message</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Post Content -->
    <article>
        <p th:text="${post.content}">Post Content goes here.</p>
        <!-- Tags Section -->
        <div class="mb-3">
            <i class="fas fa-tags me-1 text-muted"></i>
            <!-- Access the 'name' field inside the Tag object -->
            <span th:each="tag : ${post.tags}" class="badge bg-secondary me-1">
        <span th:text="${tag.name}">Tag Name</span>
    </span>
        </div>
        <!-- Action Icons: Visible only to owner or admin -->
        <div sec:authorize="isAuthenticated()"
             th:if="${#authentication.name == post.author.username || #authorization.expression('hasAnyRole(''ADMIN'')')}"
             class="mb-3">

            <!-- Edit Icon -->
            <a th:href="@{/posts/{id}/update(id=${post.id})}" class="text-warning me-3" title="Edit Post">
                <i class="fas fa-pen"></i>
            </a>

            <!-- Delete Icon -->
            <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="display:inline;">
                <button type="submit" class="text-danger border-0 bg-transparent" title="Delete Post"
                        onclick="return confirm('Are you sure?')">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </form>
        </div>
        <div class="mt-3">
            <span th:text="${'Likes: ' + post.likedByUsers.size()}">0</span>
            <!-- Like Button -->
            <form th:action="@{/posts/{id}/like(id=${post.id})}" method="post" class="d-inline">
                <button class="btn btn-sm btn-outline-primary">Like</button>
            </form>
        </div>
    </article>

    <hr>

    <!-- Comments Section -->
    <h3>Comments</h3>
    <div th:each="comment : ${post.commentList}" class="mb-3 p-2 border-bottom">
        <p>
            <a th:href="@{/users/{id}(id=${comment.author.id})}" class="text-decoration-none">
                <strong th:text="${comment.author.username}">Author</strong>
            </a>:
            <span th:text="${comment.content}">Comment text</span>
        </p>

        <!-- ACTION ICONS FOR COMMENTS -->
        <div sec:authorize="isAuthenticated()"
             th:if="${#authentication.name == comment.author.username || #authorization.expression('hasAnyRole(''ADMIN'')')}"
             class="mb-2">

            <!-- Edit Icon -->
            <a th:href="@{/comments/{id}/update(id=${comment.id})}" class="text-warning me-3" title="Edit Comment">
                <i class="fas fa-pen fa-sm"></i>
            </a>

            <!-- Delete Icon -->
            <form th:action="@{/comments/{id}/delete(id=${comment.id})}" method="post" style="display:inline;">
                <button type="submit" class="text-danger border-0 bg-transparent" title="Delete Comment"
                        onclick="return confirm('Are you sure you want to delete this comment?')">
                    <i class="fas fa-trash-alt fa-sm"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Comment Form -->
    <div sec:authorize="isAuthenticated()" class="mt-4">
        <h4>Leave a comment</h4>
        <form th:action="@{/posts/{id}/comment(id=${post.id})}" th:object="${comment}" method="post">
            <textarea th:field="*{content}" class="form-control" placeholder="Write a reply..."></textarea>
            <span class="text-danger" th:errors="*{content}" th:if="${#fields.hasErrors('content')}">Error placeholder</span>
            <button type="submit" class="btn btn-primary mt-2">Post Comment</button>
        </form>
    </div>
</div>

<!-- Footer (Use your existing footer) -->
<div th:replace="~{fragments :: footer}"></div>
<!-- Bootstrap core JS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Core theme JS-->
<script th:src="@{/js/scripts.js}"></script><!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * *-->

</body>
</html>
