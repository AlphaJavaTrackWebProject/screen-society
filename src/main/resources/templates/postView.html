<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title th:text="${post.title}">Post Details</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet"
          type="text/css"/>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800"
          rel="stylesheet" type="text/css"/>
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body>

<!-- Navigation (Use your existing nav) -->
<nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand" href="index.html" th:href="@{/}">Screen Society</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            Menu
            <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto py-4 py-lg-0">
                <th:block sec:authorize="isAnonymous()">

                    <li class="nav-item">
                        <a class="nav-link px-lg-3 py-3 py-lg-4" href="login.html" th:href="@{/auth/login}">Login</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-lg-3 py-3 py-lg-4" href="register.html" th:href="@{/auth/register}">Register</a>
                    </li>
                </th:block>

                <li class="nav-item">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" href="index.html" th:href="@{/}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" href="about.html" th:href="@{/about}">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" href="contact.html" th:href="@{/contact}">Contact</a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" href="postCreate.html" th:href="@{/posts/new}">Create Post</a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/posts}">Explore</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MODERATOR')">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" href="adminPanel.html" th:href="@{/admin/panel}">Admin
                        Panel</a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" href="index.html" th:href="@{/logout}">Logout</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!--</header>-->
<header class="masthead" th:style="'background-image: url(' + @{/assets/img/home-bg.jpg} + ')'">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="site-heading">
                    <h1 th:text="${post.title}">Post Title</h1>
                    <p>Posted by
                        <a th:href="@{/users/{id}(id=${post.author.id})}"
                           class="ms-2 text-white text-decoration-none fw-bold">
                            <i class="fas fa-user-edit me-1"></i>
                            <span th:text="${post.author.username}">Author</span>
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container mt-5">
    <!-- Post Content -->
    <article>
        <p th:text="${post.content}">Post Content goes here.</p>
        <!-- Tags Section -->
        <div class="mb-3">
            <i class="fas fa-tags me-1 text-muted"></i>
            <!-- Access the 'name' field inside the Tag object -->
            <span th:each="tag : ${post.tags}" class="badge bg-secondary me-1">
        <span th:text="${tag.name}">Tag Name</span>
    </span>
        </div>
        <!-- Action Icons: Visible only to owner or admin -->
        <div sec:authorize="isAuthenticated()"
             th:if="${#authentication.name == post.author.username || #authorization.expression('hasAnyRole(''ADMIN'')')}"
             class="mb-3">

            <!-- Edit Icon -->
            <a th:href="@{/posts/{id}/update(id=${post.id})}" class="text-warning me-3" title="Edit Post">
                <i class="fas fa-pen"></i>
            </a>

            <!-- Delete Icon -->
            <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" style="display:inline;">
                <button type="submit" class="text-danger border-0 bg-transparent" title="Delete Post"
                        onclick="return confirm('Are you sure?')">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </form>
        </div>
        <div class="mt-3">
            <span th:text="${'Likes: ' + post.likedByUsers.size()}">0</span>
            <!-- Like Button -->
            <form th:action="@{/posts/{id}/like(id=${post.id})}" method="post" class="d-inline">
                <button class="btn btn-sm btn-outline-primary">Like</button>
            </form>
        </div>
    </article>

    <hr>

    <!-- Comments Section -->
    <h3>Comments</h3>
    <div th:each="comment : ${post.commentList}">
        <p><strong th:text="${comment.author.username}">Author</strong>: <span
                th:text="${comment.content}">Comment text</span></p>
    </div>

    <!-- Comment Form -->
    <div sec:authorize="isAuthenticated()" class="mt-4">
        <h4>Leave a comment</h4>
        <form th:action="@{/posts/{id}/comment(id=${post.id})}" th:object="${comment}" method="post">
            <textarea th:field="*{content}" class="form-control" placeholder="Write a reply..."></textarea>
            <button type="submit" class="btn btn-primary mt-2">Post Comment</button>
        </form>
    </div>
</div>

<!-- Footer (Use your existing footer) -->
<footer>...</footer>

</body>
</html>
