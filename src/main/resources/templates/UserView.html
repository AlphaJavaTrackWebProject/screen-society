<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
  <title>Profile - Screen Society</title>
  <link rel="icon" th:href="@{/images/Icon.png}">
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css"/>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<!-- Navigation -->
<nav th:replace="~{fragments  :: top-nav}"></nav>


<header class="masthead" th:style="'background-image: url(' + @{/assets/img/userView-page.png} + ')'">
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="site-heading">
          <h1 th:text="${username}">Username</h1>
          <span class="subheading">Screen Society Member</span>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="container px-4 px-lg-5 mt-5 mb-5">
  <div class="row gx-4 gx-lg-5 justify-content-center">

    <!-- User Profile Information -->
    <div class="col-md-8 text-center mb-5">
      <img th:src="'https://ui-avatars.com/api/?name=' + ${user.firstName} + '+' + ${user.lastName} + '&background=random&size=256'"
           alt="Profile Picture"
           class="rounded-circle shadow mb-4"
           style="width: 150px; height: 150px;">
<!--      <i class="fas fa-user-circle fa-7x text-secondary mb-4"></i>-->
      <h2 class="fw-bolder" th:text="${user.firstName + ' ' + user.lastName}">First Last</h2>
      <p class="text-muted fs-5" th:text="${user.email}">email@example.com</p>

      <!-- Conditional Edit Button if it's their own profile -->
      <div sec:authorize="isAuthenticated()" th:if="${#authentication.name == username}" class="mt-4">
        <a th:href="@{/users/{id}/update(id=${user.id})}" class="btn btn-outline-primary text-uppercase">Edit Profile Settings</a>
      </div>
    </div>

    <hr class="my-5">

    <!-- User's Posts Section -->
    <div class="col-md-10">
      <h3 class="mb-4 fw-bolder">Recent Activity</h3>

      <div th:if="${posts != null and !posts.isEmpty()}">

        <div th:each="post : ${posts}" class="post-preview mb-4 pb-4 border-bottom">
          <a th:href="@{/posts/{id}(id=${post.id})}" class="text-decoration-none">
            <h4 class="post-title fw-bolder" th:text="${post.title}">Post Title</h4>
            <h5 class="post-subtitle fs-6 text-muted fw-light mt-2"
                th:text="${#strings.abbreviate(post.content, 150)}">Content snippet</h5>
          </a>
        </div>

      </div>

      <div th:if="${posts == null or posts.isEmpty()}">
        <p class="text-muted fst-italic">This user hasn't posted anything yet.</p>
      </div>

    </div>
  </div>
</div>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
