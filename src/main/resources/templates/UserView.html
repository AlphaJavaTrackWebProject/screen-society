<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
  <title>Profile - Screen Society</title>
  <link rel="icon" th:href="@{/images/Icon.png}">
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css"/>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
  <div class="container px-4 px-lg-5">
    <a class="navbar-brand" th:href="@{/}">Screen Society</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
      Menu <i class="fas fa-bars"></i>
    </button>
    <div class="collapse navbar-collapse" id="navbarResponsive">
      <ul class="navbar-nav ms-auto py-4 py-lg-0">
        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/}">Home</a></li>
        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/posts}">Explore</a></li>
        <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/logout}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<header class="masthead" th:style="'background-image: url(' + @{/assets/img/about-bg.jpg} + ')'">
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="site-heading">
          <h1 th:text="${register.username}">Username</h1>
          <span class="subheading">Screen Society Member</span>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="container px-4 px-lg-5 mt-5 mb-5">
  <div class="row gx-4 gx-lg-5 justify-content-center">
    <div class="col-md-8 text-center">
      <i class="fas fa-user-circle fa-7x text-secondary mb-4"></i>
      <h2 class="fw-bolder" th:text="${register.firstName + ' ' + register.lastName}">First Last</h2>
      <p class="text-muted fs-5" th:text="${register.email}">email@example.com</p>

      <hr class="my-5">

      <!-- Conditional Edit Button if it's their own profile -->
      <div sec:authorize="isAuthenticated()" th:if="${#authentication.name == register.username}">
        <a th:href="@{/users/{id}/update(id=${register.id})}" class="btn btn-outline-primary text-uppercase">Edit Profile Settings</a>
      </div>
    </div>
  </div>
</div>

<footer class="border-top">
  <div class="container px-4 px-lg-5">
    <div class="small text-center text-muted fst-italic py-4">Copyright &copy; Screen Society 2026</div>
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
