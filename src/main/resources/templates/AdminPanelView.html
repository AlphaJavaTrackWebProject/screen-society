<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>Admin Panel - Screen Society</title>
    <link rel="icon" th:href="@{/images/Icon.png}">
    <!--suppress JSUnresolvedLibraryURL -->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!--suppress HtmlUnknownTarget -->
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css"/>
    <!--suppress HtmlUnknownTarget -->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<!-- Navigation -->
<nav th:replace="~{fragments  :: top-nav}"></nav>


<header class="masthead" th:style="'background-image: url(' + @{/assets/img/adminPanel-page.png} + ')'">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="site-heading">
                    <h1>Admin Dashboard</h1>
                    <span class="subheading">Manage the Screen Society community</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container px-4 px-lg-5 mt-5 mb-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
        <div class="col-md-5 mb-4">
            <div class="card shadow-sm h-100 text-center py-5">
                <div class="card-body">
                    <i class="fas fa-users fa-3x text-primary mb-3"></i>
                    <h3 class="card-title">User Management</h3>
                    <p class="card-text text-muted">View, filter, block, or unblock registered society members.</p>
                    <a th:href="@{/admin/users}" class="btn btn-primary mt-3">Manage Users</a>
                </div>
            </div>
        </div>
        <div class="col-md-5 mb-4">
            <div class="card shadow-sm h-100 text-center py-5">
                <div class="card-body">
                    <i class="fas fa-file-alt fa-3x text-success mb-3"></i>
                    <h3 class="card-title">Post Moderation</h3>
                    <p class="card-text text-muted">Review, filter, and oversee all community posts and discussions.</p>
                    <a th:href="@{/admin/posts}" class="btn btn-success mt-3">Manage Posts</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>
<!--suppress JSUnresolvedLibraryURL -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
