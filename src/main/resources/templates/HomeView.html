<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Screen Society - Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="../static/images/Icon.png" th:href="@{/images/Icon.png}">
</head>
<body class="bg-light">
<header class="text-center pt-4">
    <a href="/">Home</a> |
    <a href="/about">About</a> |

    <!-- This only shows if the Bouncer says they are logged in -->
    <span sec:authorize="isAuthenticated()">
        <a href="/posts">All Posts</a> |
        <a href="/posts/new">Create Post</a> |
        <a th:href="@{/users/{id}/update(id=${#authentication.principal.user.id})}">Edit Profile</a> |
        <a href="/logout">Logout</a>
    </span>

    <!-- This only shows if the Bouncer says they are an anonymous guest -->
    <span sec:authorize="isAnonymous()">
        <a href="/login">Login</a> |
        <a href="/register">Register</a>
    </span>

    <!-- BONUS: You can even check roles! -->
    <span sec:authorize="hasRole('ADMIN')">
        | <a href="/admin/dashboard" class="text-danger">Admin Panel</a>
    </span>
</header>

<div class="container text-center mt-5">

    <h1 class="display-3 fw-bold text-dark">Welcome to Screen Society! 🎬</h1>
    <p class="lead text-secondary mt-3">Your Spring MVC engine is officially running on all cylinders.</p>

    <button class="btn btn-primary btn-lg mt-4">This is a Bootstrap Button</button>

</div>


<footer class="text-center mt-5 pb-4">
<small> ©️ Copyright 2026, ScreenSociety </small>
</footer>

</body>
</html>
