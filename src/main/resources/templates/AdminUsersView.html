<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
  <title>Manage Users - Screen Society</title>
  <link rel="icon" th:href="@{/images/Icon.png}">
  <!--suppress JSUnresolvedLibraryURL -->
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
  <!--suppress HtmlUnknownTarget -->
  <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css"/>
  <!--suppress HtmlUnknownTarget -->
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css"/>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
  <div class="container px-4 px-lg-5">
    <a class="navbar-brand" th:href="@{/}">Screen Society</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
      Menu <i class="fas fa-bars"></i>
    </button>
    <div class="collapse navbar-collapse" id="navbarResponsive">
      <ul class="navbar-nav ms-auto py-4 py-lg-0">
        <li class="nav-item"><a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/}">Home</a></li>
        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MODERATOR')"><a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/admin/panel}">Admin Panel</a></li>
        <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/logout}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<header class="masthead" th:style="|background-image: url('@{/assets/img/home-bg.jpg}')|">
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="site-heading">
          <h1>Manage Users</h1>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="container px-4 px-lg-5 mt-5 mb-5">

  <div th:if="${errorMessage}" class="alert alert-danger text-center alert-dismissible fade show" role="alert">
    <span th:text="${errorMessage}">Error message goes here</span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <form th:action="@{/admin/users}" method="get" class="row g-3 mb-4 p-3 bg-light rounded shadow-sm">
    <div class="col-md-8">
      <label for="searchUsername" class="visually-hidden">Search by username</label>
      <input type="text" id="searchUsername" name="username" class="form-control" placeholder="Search by username..." th:value="${param.username}">
    </div>
    <div class="col-md-4">
      <button type="submit" class="btn btn-primary w-100">Filter Users</button>
    </div>
  </form>

  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.username}">User123</td>
        <td th:text="${user.email}">user@test.com</td>

        <td>
          <span class="badge bg-secondary" th:classappend="${#strings.equals(user.role, 'ADMIN')} ? 'bg-danger' : (${#strings.equals(user.role, 'MODERATOR')} ? 'bg-primary' : 'bg-secondary')" th:text="${user.role}">USER</span>
        </td>

        <!-- Status Badge -->
        <td>
          <span class="badge bg-danger" th:if="${user.isBlocked}">Blocked</span>
          <span class="badge bg-success" th:unless="${user.isBlocked}">Active</span>
        </td>

        <td>
          <!-- Show Block only if user is active -->
          <form th:unless="${user.isBlocked}" th:action="@{/admin/{id}/block(id=${user.id})}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-sm btn-outline-danger" title="Block User">Block</button>
          </form>

          <!-- Show Unblock only if user is blocked -->
          <form th:if="${user.isBlocked}" th:action="@{/admin/{id}/unblock(id=${user.id})}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-sm btn-outline-success" title="Unblock User">Unblock</button>
          </form>

          <th:block sec:authorize="hasRole('ADMIN')">
            <!-- Safety Check: Admin cannot change their own role -->
            <th:block th:if="${#authentication.name != user.username}">

              <!-- If USER -->
              <th:block th:if="${#strings.equals(user.role, 'USER')}">
                <form th:action="@{/admin/{id}/promote-mod(id=${user.id})}" method="post" style="display:inline;">
                  <button type="submit" class="btn btn-sm btn-outline-info" title="Promote to Moderator">Make Mod</button>
                </form>
                <form th:action="@{/admin/{id}/promote(id=${user.id})}" method="post" style="display:inline;">
                  <button type="submit" class="btn btn-sm btn-outline-dark" title="Promote to Admin">Make Admin</button>
                </form>
              </th:block>

              <!-- If MODERATOR -->
              <th:block th:if="${#strings.equals(user.role, 'MODERATOR')}">
                <form th:action="@{/admin/{id}/demote-user(id=${user.id})}" method="post" style="display:inline;">
                  <button type="submit" class="btn btn-sm btn-outline-secondary" title="Demote to User">Make User</button>
                </form>
                <form th:action="@{/admin/{id}/promote(id=${user.id})}" method="post" style="display:inline;">
                  <button type="submit" class="btn btn-sm btn-outline-dark" title="Promote to Admin">Make Admin</button>
                </form>
              </th:block>

              <!-- If ADMIN -->
              <th:block th:if="${#strings.equals(user.role, 'ADMIN')}">
                <form th:action="@{/admin/{id}/demote-mod(id=${user.id})}" method="post" style="display:inline;">
                  <button type="submit" class="btn btn-sm btn-outline-warning" title="Demote to Moderator">Make Mod</button>
                </form>
                <form th:action="@{/admin/{id}/demote-user(id=${user.id})}" method="post" style="display:inline;">
                  <button type="submit" class="btn btn-sm btn-outline-danger" title="Demote to User" onclick="return confirm('Are you sure you want to strip this user of all admin rights?')">Make User</button>
                </form>
              </th:block>

            </th:block>
          </th:block>
        </td>
      </tr>
      </tbody>
    </table>
    <div th:if="${#lists.isEmpty(users)}" class="alert alert-info text-center">No users found.</div>
  </div>
</div>

<footer class="border-top">
  <div class="container px-4 px-lg-5">
    <div class="small text-center text-muted fst-italic py-4">Copyright &copy; Screen Society 2026</div>
  </div>
</footer>
<!--suppress JSUnresolvedLibraryURL -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
